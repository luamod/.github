name: Tests
# Shared Busted workflow.

on:
  workflow_call:
    inputs:
      lua_versions:
        required: false
        default: '["5.4"]'
        type: string
      luarocks_deps:
        required: false
        default: |
          busted
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      # Keep failures easy to read by running one Lua version at a time.
      fail-fast: true
      max-parallel: 1
      matrix:
        lua-version: ${{ fromJson(inputs.lua_versions) }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v12
        with:
          luaVersion: ${{ matrix.lua-version }}

      - name: Setup LuaRocks
        uses: leafo/gh-actions-luarocks@v6

      - name: Install LuaRocks Dependencies
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r dep; do
            [ -n "$dep" ] || continue
            luarocks install "$dep"
          done <<'EOF'
          ${{ inputs.luarocks_deps }}
          EOF

      - name: Run Busted
        run: busted
