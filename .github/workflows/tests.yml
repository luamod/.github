name: Tests
# Shared Busted test workflow for local callers.

on:
  workflow_call:
    # Callers provide the platform, Lua matrix, and rock deps.
    inputs:
      runner:
        required: true
        type: string
      lua_versions:
        required: true
        type: string
      luarocks_deps:
        required: true
        type: string

jobs:
  test:
    runs-on: ${{ inputs.runner }}
    strategy:
      # Keep failures easy to read by running one Lua version at a time.
      fail-fast: true
      max-parallel: 1
      matrix:
        lua-version: ${{ fromJson(inputs.lua_versions) }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v12
        with:
          luaVersion: ${{ matrix.lua-version }}

      - name: Setup LuaRocks
        uses: leafo/gh-actions-luarocks@v6

      - name: Install LuaRocks Dependencies
        shell: bash
        run: |
          # Accept a newline-delimited dependency list from the caller workflow.
          while IFS= read -r dep; do
            [ -n "$dep" ] && luarocks install "$dep"
          done <<'EOF'
          ${{ inputs.luarocks_deps }}
          EOF

      - name: Run Busted
        run: busted
